<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success!</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .box { background: #2a2a2a; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 350px; }
        h1 { color: #28a745; }
        a { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; }
        a:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="box">
        {% if action == 'register' %}
            <h1>Registration Successful!</h1>
            <p>Your account has been created securely.</p>
            <a href="/">Go to Login</a>
        {% elif action == 'login' %}
            <h1>Login Successful!</h1>
            <p>Welcome back to your Secure Vault.</p>
            <a href="/dashboard">Enter Dashboard</a>
        {% endif %}
    </div>
</body>
</html>
